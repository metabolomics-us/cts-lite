name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"
        cache: true

    - name: Run Go Tests
      run: go test ./... -v

  build_and_push_image:
    if: "!contains(github.event.head_commit.message, 'nobuild')"
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        echo "Before:"
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                    /usr/local/share/boost /usr/local/share/swift \
                    /usr/lib/jvm /opt/hostedtoolcache/CodeQL
        echo "After:"
        df -h

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: AWS Login
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Download Dataset
      run: |
        aws s3 cp s3://cts-lite-datasets/cts-lite_latest.csv.gz dataset/cts-lite_latest.csv.gz
        gzip -d dataset/cts-lite_latest.csv.gz

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"
        cache: true

    - name: Build Database
      run: |
        cd dataset && go run ./cmd/build-db/build-db.go cts-lite_latest.csv compounds.db
        touch -t 197001010000 compounds.db  # normalize mtime so ECR can use the cached layer when pushing the image
        rm -v cts-lite_latest.csv

    - name: Build the Docker image
      run: docker build . -t cts-lite:latest

    - name: Push to ECR
      env:
        ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker tag cts-lite:latest $ECR_REGISTRY/cts-lite:latest
        docker tag cts-lite:latest $ECR_REGISTRY/cts-lite:$IMAGE_TAG
        docker push $ECR_REGISTRY/cts-lite:latest
        docker push $ECR_REGISTRY/cts-lite:$IMAGE_TAG

  deploy_to_ecs:
    if: "!contains(github.event.head_commit.message, 'nodeploy')"
    needs: build_and_push_image
    runs-on: ubuntu-latest

    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Force New ECS Deployment
      env:
        CLUSTER: ${{ secrets.AWS_CLUSTER_NAME }}
        SERVICE: ${{ secrets.AWS_SERVICE_NAME }}
      run: |
        aws ecs update-service \
        --cluster $CLUSTER \
        --service $SERVICE \
        --force-new-deployment

    - name: Wait for ECS Service to Stabilize
      env:
        CLUSTER: ${{ secrets.AWS_CLUSTER_NAME }}
        SERVICE: ${{ secrets.AWS_SERVICE_NAME }}
      run: |
        aws ecs wait services-stable \
        --cluster $CLUSTER \
        --service $SERVICE


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS-Lite</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/jpg" href="assets/cts-lite.jpg"/>
</head>
<body>
    <div class="banner-container">
        <nav class="navbar">
            <!-- Skip link for accessibility, only appears on focus -->
            <a href="#main-content" class="skip-link navbar-item">Skip to content</a>

            <a class="navbar-item" href="pages/documentation.html">Documentation</a>

            <a id="navbar-logo" class="navbar-item" href="index.html">
                <h1>CTS-Lite</h1>
                <h2 style="margin: 5px">UC Davis Fiehn Lab</h2>
            </a>

            <a class="navbar-item" href="https://github.com/metabolomics-us/cts-lite/issues" target="_blank" title="Report issues or request features">Feedback&emsp;&emsp;&emsp;</a>
        </nav>
        <main id="main-content">
            <form id="query-form">
                <label for="query-input" id="input-label">Accepts InChIs, InChIKeys, SMILES, Molecular Formulas, and PubChem CIDs</label>
                <p style="font-size: 0.9rem; margin-top: 0.5rem;">Space, Tab, or Newline separated entries</p>
                <textarea id="query-input" rows="5" cols="40"
                placeholder="InChI=1S/CH4/h1H4 &#10;VYZAHLCBVHPDDF-UHFFFAOYSA-N &#10;O=C(O)CC(N)C(=O)NC(C(=O)O)CC(C)C &#10;H2O &#10;962"></textarea>
                <br>
                <div class="form-actions">
                    <button type="submit" style="min-height: 44px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);">Match</button>
                    <div class="cog-wrapper">
                        <button type="button" class="cog-btn" id="settings-toggle" aria-label="Settings button" aria-expanded="false">
                            <img src="assets/settings-icon.svg" alt="settings" width="22" height="22">
                        </button>
                        <div class="settings-panel" id="settings-panel">
                            <div class="settings-row">
                                <span>Top Hit Only</span>
                                <label class="toggle-label" aria-label="Top hit only">
                                    <input type="checkbox" checked id="top-hit-only">
                                    <span class="toggle-track"></span>
                                </label>
                            </div>
                            <div class="settings-row" style="margin-top: 0.75rem;">
                                <span>Results Per Page</span>
                                <select id="page-size-select" aria-label="Results per page">
                                    <option value="10" selected>10</option>
                                    <option value="20">20</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
            <div id="output-container">
                <div class="results-header">
                    <label for="output-text" id="output-label">Results</label>
                    <div id="download-buttons">
                        <button class="download-btn" id="download-csv" type="button">
                            CSV <img src="assets/download-icon.svg" alt="Download" width="17" height="17">
                        </button>
                        <button class="download-btn" id="download-json" type="button">
                            JSON <img src="assets/download-icon.svg" alt="Download" width="17" height="17">
                        </button>
                    </div>
                </div>
                <label id="top-hit-label" style="display: none; margin: -0.4rem 0 0.5rem 0; font-size: 0.85rem; color: #444444;"></label>
                <hr>
                <div id="output-text"></div>
                <div id="pagination-controls">
                    <button type="button" class="pagination-btn" id="prev-page">&#8592; Prev</button>
                    <div id="page-info" class="page-info"></div>
                    <button type="button" class="pagination-btn" id="next-page">Next &#8594;</button>
                </div>
            </div>
        </main>
    </div>
<script src="script.js"></script>
</body>
</html>
